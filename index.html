<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firewall Audit Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232635; --border: #2e3250;
    --text: #e2e4f0; --text-dim: #7a7f9a;
    --critical: #ff4d4d; --critical-bg: rgba(255,77,77,0.12);
    --high: #ff8c42;    --high-bg: rgba(255,140,66,0.12);
    --medium: #f5c842;  --medium-bg: rgba(245,200,66,0.12);
    --low: #4da6ff;     --low-bg: rgba(77,166,255,0.12);
    --ok: #4dff91;      --ok-bg: rgba(77,255,145,0.10);
    --accent: #6c7bff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:18px;font-weight:700;}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .conn-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .dot.green{background:var(--ok);}
  .dot.red{background:var(--critical);}
  #ts-label{color:var(--text-dim);font-size:12px;}

  /* Layout */
  main{padding:24px;max-width:1700px;margin:0 auto;}
  section{margin-bottom:28px;}
  h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px;}

  /* Panel */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;}

  /* Connect form */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px;}
  .form-field{display:flex;flex-direction:column;gap:5px;}
  .form-field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);}
  .form-field input,.form-field select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-size:13px;outline:none;width:100%;}
  .form-field input:focus,.form-field select:focus{border-color:var(--accent);}
  .form-field input::placeholder{color:var(--text-dim);}

  /* Buttons */
  button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s;}
  button:hover:not(:disabled){opacity:.85;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.sec{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:500;}
  button.danger{background:rgba(255,77,77,.15);border:1px solid var(--critical);color:var(--critical);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  /* Alert box */
  .alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
  .alert.err{background:var(--critical-bg);border:1px solid var(--critical);color:var(--critical);}
  .alert.ok{background:var(--ok-bg);border:1px solid var(--ok);color:var(--ok);}
  .alert.info{background:var(--low-bg);border:1px solid var(--low);color:var(--low);}

  /* Spinner */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Layer picker */
  .layer-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;}
  .layer-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;cursor:pointer;transition:border-color .15s;}
  .layer-item:hover{border-color:var(--accent);}
  .layer-item.selected{border-color:var(--accent);background:rgba(108,123,255,.1);}
  .layer-name{font-weight:600;}
  .layer-pkg{font-size:11px;color:var(--text-dim);}

  /* Summary cards */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
  .card .num{font-size:28px;font-weight:700;}
  .card .lbl{font-size:12px;color:var(--text-dim);}
  .card.critical{border-color:var(--critical);background:var(--critical-bg);}  .card.critical .num{color:var(--critical);}
  .card.high    {border-color:var(--high);background:var(--high-bg);}            .card.high .num{color:var(--high);}
  .card.medium  {border-color:var(--medium);background:var(--medium-bg);}        .card.medium .num{color:var(--medium);}
  .card.low     {border-color:var(--low);background:var(--low-bg);}              .card.low .num{color:var(--low);}
  .card.ok      {border-color:var(--ok);background:var(--ok-bg);}                .card.ok .num{color:var(--ok);}

  /* Risk bars */
  .risk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .risk-row:last-child{margin-bottom:0;}
  .risk-label{width:280px;font-size:12px;color:var(--text-dim);flex-shrink:0;}
  .bar-track{flex:1;background:var(--surface2);border-radius:999px;height:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .4s;}
  .risk-count{width:40px;text-align:right;font-size:12px;font-weight:600;}

  /* Filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .filters input[type=text]{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 12px;font-size:13px;outline:none;flex:1;min-width:200px;}
  .filters input[type=text]:focus{border-color:var(--accent);}
  .filters select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 12px;font-size:13px;outline:none;}
  .badge-filter{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;user-select:none;opacity:.6;transition:opacity .15s,border-color .15s;}
  .badge:hover{opacity:.9;}
  .badge.active{opacity:1;border-color:currentColor;}
  .badge.CRITICAL{background:var(--critical-bg);color:var(--critical);}
  .badge.HIGH    {background:var(--high-bg);color:var(--high);}
  .badge.MEDIUM  {background:var(--medium-bg);color:var(--medium);}
  .badge.LOW     {background:var(--low-bg);color:var(--low);}
  .badge.OK      {background:var(--ok-bg);color:var(--ok);}

  /* Table */
  .table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:var(--surface2);color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
  thead th:hover{color:var(--text);}
  thead th.sorted .si{color:var(--accent);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  tbody td{padding:9px 14px;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  tbody td.wrap{white-space:normal;word-break:break-all;}
  tr.sev-CRITICAL{background:rgba(255,77,77,.05);}
  tr.sev-HIGH{background:rgba(255,140,66,.04);}
  tr.sev-MEDIUM{background:rgba(245,200,66,.04);}

  /* Tags */
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;margin:1px;}
  .tag.CRITICAL{background:var(--critical-bg);color:var(--critical);border:1px solid var(--critical);}
  .tag.HIGH    {background:var(--high-bg);color:var(--high);border:1px solid var(--high);}
  .tag.MEDIUM  {background:var(--medium-bg);color:var(--medium);border:1px solid var(--medium);}
  .tag.LOW     {background:var(--low-bg);color:var(--low);border:1px solid var(--low);}
  .tag.OK      {background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok);}
  .tag.INFO    {background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}

  .act-allow{color:var(--critical);font-weight:700;}
  .act-deny {color:var(--ok);font-weight:700;}
  .act-drop {color:var(--medium);font-weight:700;}
  .val-any  {color:var(--critical);font-weight:700;}
  .val-zero {color:var(--medium);font-weight:700;}

  .empty-state{padding:60px;text-align:center;color:var(--text-dim);}
  .table-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:var(--text-dim);font-size:12px;}
  .table-meta strong{color:var(--text);}

  /* Pagination */
  .pagination{display:flex;gap:6px;align-items:center;margin-top:12px;flex-wrap:wrap;}
  .pagination button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 12px;font-size:12px;font-weight:500;}
  .pagination button.active{background:var(--accent);border-color:var(--accent);}
  .pagination span{color:var(--text-dim);font-size:12px;}

  /* Progress bar */
  .progress-wrap{background:var(--surface2);border-radius:999px;height:6px;overflow:hidden;margin:10px 0;}
  .progress-bar{height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}

  @media(max-width:600px){main{padding:12px;}.summary-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6c7bff" stroke-width="2">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    <polyline points="9 12 11 14 15 10"/>
  </svg>
  <h1>Firewall Audit Dashboard</h1>
  <div class="hdr-right">
    <div class="conn-status"><div class="dot" id="conn-dot"></div><span id="conn-label">Not connected</span></div>
    <span id="ts-label"></span>
    <button class="sec" id="btn-disconnect" style="display:none" onclick="disconnect()">Disconnect</button>
  </div>
</header>

<main>

  <!-- ── CONNECT ── -->
  <section id="sec-connect">
    <h2>1 — Connect to Check Point Management API</h2>
    <div class="panel">
      <div id="alert-connect" class="alert"></div>
      <div class="form-grid">
        <div class="form-field" style="grid-column:span 2">
          <label>Management Server (IP or hostname)</label>
          <input id="cp-server" type="text" placeholder="192.168.1.1">
        </div>
        <div class="form-field">
          <label>Port</label>
          <input id="cp-port" type="number" value="443">
        </div>
        <div class="form-field">
          <label>Domain (optional — for MDS)</label>
          <input id="cp-domain" type="text" placeholder="Leave blank for standalone">
        </div>
        <div class="form-field">
          <label>Username</label>
          <input id="cp-user" type="text" placeholder="admin">
        </div>
        <div class="form-field">
          <label>Password</label>
          <input id="cp-pass" type="password" placeholder="••••••••">
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-connect" onclick="doLogin()">Connect</button>
        <button class="sec" onclick="loadSample()">Use Sample Data</button>
      </div>
    </div>
  </section>

  <!-- ── SELECT LAYER ── -->
  <section id="sec-layers" style="display:none">
    <h2>2 — Select Access Policy / Layer</h2>
    <div class="panel">
      <div id="alert-layers" class="alert"></div>
      <div id="layer-loading" style="display:none"><span class="spinner"></span>Loading policies…</div>
      <div class="layer-list" id="layer-list"></div>
      <div class="btn-row" style="margin-top:14px">
        <button id="btn-load-rules" onclick="loadRules()" disabled>Load Rules</button>
        <button class="sec" onclick="backToConnect()">Back</button>
      </div>
    </div>
  </section>

  <!-- ── LOADING RULES ── -->
  <section id="sec-loading" style="display:none">
    <div class="panel" style="text-align:center;padding:40px">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 16px"></div>
      <div id="load-msg" style="color:var(--text-dim);font-size:14px">Fetching rules…</div>
      <div class="progress-wrap" style="max-width:400px;margin:12px auto 0">
        <div class="progress-bar" id="load-bar" style="width:0%"></div>
      </div>
    </div>
  </section>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard" style="display:none">

    <section>
      <h2>Summary</h2>
      <div class="summary-grid" id="summary-cards"></div>
    </section>

    <section>
      <h2>Risk Breakdown</h2>
      <div class="panel" id="risk-bars"></div>
    </section>

    <section>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
        <h2 style="margin-bottom:0">Rules</h2>
        <div class="btn-row">
          <button class="sec" onclick="exportCSV()">Export Flagged CSV</button>
          <button class="sec" onclick="window.print()">Print Report</button>
          <button class="sec" onclick="backToLayers()">Change Policy</button>
        </div>
      </div>
      <div class="filters">
        <input type="text" id="search" placeholder="Search name, address, service, comment…" oninput="applyFilters()">
        <select id="filter-action" onchange="applyFilters()">
          <option value="">All Actions</option>
          <option value="allow">Allow / Permit</option>
          <option value="deny">Deny / Reject</option>
          <option value="drop">Drop</option>
        </select>
        <select id="filter-sev" onchange="applyFilters()">
          <option value="">All Severities</option>
          <option value="CRITICAL">Critical</option>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
          <option value="OK">OK</option>
        </select>
        <div class="badge-filter" id="risk-badges"></div>
      </div>
      <div class="table-meta">
        Showing <strong id="visible-count">0</strong> of <strong id="total-count">0</strong> rules
        &nbsp;|&nbsp; Layer: <strong id="active-layer-label"></strong>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="rules-thead"></thead>
          <tbody id="rules-tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>
  </div>

</main>

<script>
// ════════════════════════════════════════════════════════════════
// RISK DEFINITIONS
// ════════════════════════════════════════════════════════════════
const RISKS = [
  { id:'ALL_ANY_ALLOW',   sev:'CRITICAL', label:'Any Src + Dst + Svc (Allow)',       desc:'Completely unrestricted allow rule — any-any-any' },
  { id:'BOTH_ANY_ALLOW',  sev:'CRITICAL', label:'Any Src + Any Dst (Allow)',         desc:'Allows traffic from any source to any destination' },
  { id:'ANY_SRC_ALLOW',   sev:'HIGH',     label:'Any Source (Allow)',                desc:'Permit rule with no source restriction' },
  { id:'ANY_DST_ALLOW',   sev:'HIGH',     label:'Any Destination (Allow)',           desc:'Permit rule with no destination restriction' },
  { id:'ANY_SVC_ALLOW',   sev:'HIGH',     label:'Any Service / Port (Allow)',        desc:'No port/protocol restriction on allow rule' },
  { id:'ANY_SRC',         sev:'MEDIUM',   label:'Any Source (non-Allow)',            desc:'Source is "any" on a non-allow rule' },
  { id:'ANY_DST',         sev:'MEDIUM',   label:'Any Destination (non-Allow)',       desc:'Destination is "any" on a non-allow rule' },
  { id:'ANY_SVC',         sev:'MEDIUM',   label:'Any Service / Port (non-Allow)',    desc:'Service is "any" on a non-allow rule' },
  { id:'NO_HITS',         sev:'MEDIUM',   label:'Zero Hit Count',                   desc:'Rule has never matched traffic — possibly unused/obsolete' },
  { id:'BROAD_SUBNET_SRC',sev:'MEDIUM',   label:'Very Broad Source Subnet (≤/8)',   desc:'Source subnet covers >16 million hosts' },
  { id:'BROAD_SUBNET_DST',sev:'MEDIUM',   label:'Very Broad Dest Subnet (≤/8)',     desc:'Destination subnet covers >16 million hosts' },
  { id:'DISABLED',        sev:'LOW',      label:'Disabled Rule',                    desc:'Rule is disabled but still present in policy' },
  { id:'NO_DESCRIPTION',  sev:'LOW',      label:'No Description / Comment',         desc:'Rule has no documentation' },
];
const RISK_MAP = Object.fromEntries(RISKS.map(r => [r.id, r]));

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let session = { sid: null, server: null, port: 443 };
let layers        = [];
let selectedLayer = null;
let auditedRules  = [];
let filteredRules = [];
let sortCol = null, sortDir = 1;
let pageNum = 0;
const PAGE_SIZE = 50;

// ════════════════════════════════════════════════════════════════
// API HELPERS
// ════════════════════════════════════════════════════════════════
async function api(endpoint, body) {
  const r = await fetch('/api/cp/' + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ server: session.server, port: session.port, sid: session.sid, ...body })
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

function showAlert(id, msg, type = 'err') {
  const el = document.getElementById(id);
  el.className = `alert ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideAlert(id) { document.getElementById(id).style.display = 'none'; }

// ════════════════════════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════════════════════════
async function doLogin() {
  const server   = document.getElementById('cp-server').value.trim();
  const port     = parseInt(document.getElementById('cp-port').value) || 443;
  const username = document.getElementById('cp-user').value.trim();
  const password = document.getElementById('cp-pass').value;
  const domain   = document.getElementById('cp-domain').value.trim();

  if (!server || !username || !password)
    return showAlert('alert-connect', 'Server, username and password are required.');

  hideAlert('alert-connect');
  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connecting…';

  try {
    const body = { server, port, username, password };
    if (domain) body.domain = domain;
    const r = await fetch('/api/cp/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);

    session.sid    = data.sid;
    session.server = server;
    session.port   = port;

    setConnected(server);
    await loadLayers();
  } catch (e) {
    showAlert('alert-connect', e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Connect';
  }
}

function setConnected(server) {
  document.getElementById('conn-dot').className = 'dot green';
  document.getElementById('conn-label').textContent = 'Connected: ' + server;
  document.getElementById('btn-disconnect').style.display = '';
  document.getElementById('sec-connect').style.display = 'none';
  document.getElementById('sec-layers').style.display = '';
}

async function disconnect() {
  if (session.sid) {
    try { await api('logout', {}); } catch(_) {}
    session = { sid: null, server: null, port: 443 };
  }
  document.getElementById('conn-dot').className = 'dot';
  document.getElementById('conn-label').textContent = 'Not connected';
  document.getElementById('btn-disconnect').style.display = 'none';
  backToConnect();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('sec-layers').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════
// LAYERS
// ════════════════════════════════════════════════════════════════
async function loadLayers() {
  document.getElementById('layer-loading').style.display = '';
  document.getElementById('layer-list').innerHTML = '';
  hideAlert('alert-layers');

  try {
    // Try show-access-layers first, fall back to packages
    let allLayers = [];
    try {
      const res = await api('layers', {});
      allLayers = res.layers || [];
    } catch(_) {}

    if (!allLayers.length) {
      const res = await api('packages', {});
      for (const pkg of (res.packages || [])) {
        for (const l of (pkg['access-layers'] || [])) {
          allLayers.push({ ...l, _pkg: pkg.name });
        }
      }
    }

    layers = allLayers;
    renderLayerList();
  } catch (e) {
    showAlert('alert-layers', 'Failed to load policies: ' + e.message);
  } finally {
    document.getElementById('layer-loading').style.display = 'none';
  }
}

function renderLayerList() {
  const list = document.getElementById('layer-list');
  if (!layers.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:13px">No access layers found. Check permissions.</div>';
    return;
  }
  list.innerHTML = layers.map((l, i) => `
    <div class="layer-item" data-idx="${i}" onclick="selectLayer(${i})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      <div>
        <div class="layer-name">${esc(l.name || l.uid)}</div>
        ${l._pkg ? `<div class="layer-pkg">Package: ${esc(l._pkg)}</div>` : ''}
      </div>
    </div>`).join('');
}

function selectLayer(idx) {
  selectedLayer = layers[idx];
  document.querySelectorAll('.layer-item').forEach((el, i) =>
    el.classList.toggle('selected', i === idx));
  document.getElementById('btn-load-rules').disabled = false;
}

// ════════════════════════════════════════════════════════════════
// LOAD RULES
// ════════════════════════════════════════════════════════════════
async function loadRules() {
  if (!selectedLayer) return;
  document.getElementById('sec-layers').style.display = 'none';
  document.getElementById('sec-loading').style.display = '';
  document.getElementById('dashboard').style.display = 'none';

  setLoadMsg('Requesting rules from Check Point…', 10);

  try {
    const res = await api('rules', { name: selectedLayer.name, uid: selectedLayer.uid });
    setLoadMsg(`Analysing ${res.total} rules…`, 80);
    await new Promise(r => setTimeout(r, 50));

    auditedRules = res.rules.map(auditRule);
    setLoadMsg('Done!', 100);
    await new Promise(r => setTimeout(r, 200));

    document.getElementById('active-layer-label').textContent = selectedLayer.name;
    document.getElementById('ts-label').textContent = 'Audited: ' + new Date().toLocaleString();
    showDashboard();
  } catch (e) {
    document.getElementById('sec-layers').style.display = '';
    document.getElementById('sec-loading').style.display = 'none';
    showAlert('alert-layers', 'Failed to load rules: ' + e.message);
  }
}

function setLoadMsg(msg, pct) {
  document.getElementById('load-msg').textContent = msg;
  document.getElementById('load-bar').style.width = pct + '%';
}

// ════════════════════════════════════════════════════════════════
// AUDIT ENGINE
// ════════════════════════════════════════════════════════════════
const ANY_RE = /^(any|all|\*|0\.0\.0\.0\/0|::\/0|0\/0|any\/any)$/i;
function isAny(v)   { return v && (ANY_RE.test(v.trim()) || /\bany\b/i.test(v)); }
function isAllow(v) { return /allow|permit|accept|pass/i.test(v || ''); }
function isDeny(v)  { return /deny|reject|refuse/i.test(v || ''); }
function isDrop(v)  { return /drop|discard/i.test(v || ''); }
function isDisabled(v) { return /no|false|disabled|inactive|off/i.test(String(v || '').trim()); }
function isBroadSubnet(v) { const m = String(v||'').match(/\/(\d+)/); return m && parseInt(m[1]) <= 8; }

function auditRule(r) {
  const allow = isAllow(r.action);
  const deny  = isDeny(r.action);
  const drop  = isDrop(r.action);
  const anySrc = isAny(r.src);
  const anyDst = isAny(r.dst);
  const anySvc = isAny(r.service);
  const disabled = r.enabled === 'No';
  const zeroHits = r.hits !== '' && r.hits !== null && r.hits !== undefined && Number(r.hits) === 0;

  const flags = [];
  if (allow) {
    if (anySrc && anyDst && anySvc) flags.push('ALL_ANY_ALLOW');
    else if (anySrc && anyDst)      flags.push('BOTH_ANY_ALLOW');
    if (anySrc) flags.push('ANY_SRC_ALLOW');
    if (anyDst) flags.push('ANY_DST_ALLOW');
    if (anySvc) flags.push('ANY_SVC_ALLOW');
  } else {
    if (anySrc) flags.push('ANY_SRC');
    if (anyDst) flags.push('ANY_DST');
    if (anySvc) flags.push('ANY_SVC');
  }
  if (disabled)               flags.push('DISABLED');
  if (zeroHits)               flags.push('NO_HITS');
  if (!r.comment)             flags.push('NO_DESCRIPTION');
  if (!anySrc && isBroadSubnet(r.src)) flags.push('BROAD_SUBNET_SRC');
  if (!anyDst && isBroadSubnet(r.dst)) flags.push('BROAD_SUBNET_DST');

  const unique = [...new Set(flags)];
  const sevOrd = { CRITICAL:4, HIGH:3, MEDIUM:2, LOW:1, OK:0 };
  let maxSev = 'OK';
  unique.forEach(id => { const s = RISK_MAP[id]?.sev; if (s && sevOrd[s] > sevOrd[maxSev]) maxSev = s; });

  return { ...r, flags: unique, severity: maxSev, allow, deny, drop };
}

// ════════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════════
function showDashboard() {
  document.getElementById('sec-loading').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  renderCards();
  renderRiskBars();
  renderBadges();
  renderTableHeader();
  applyFilters();
}

function renderCards() {
  const bySev = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0, OK:0 };
  auditedRules.forEach(r => bySev[r.severity]++);
  document.getElementById('summary-cards').innerHTML = [
    { cls:'',         num:auditedRules.length, lbl:'Total Rules' },
    { cls:'critical', num:bySev.CRITICAL,      lbl:'Critical' },
    { cls:'high',     num:bySev.HIGH,          lbl:'High' },
    { cls:'medium',   num:bySev.MEDIUM,        lbl:'Medium' },
    { cls:'low',      num:bySev.LOW,           lbl:'Low' },
    { cls:'ok',       num:bySev.OK,            lbl:'Clean' },
  ].map(c => `<div class="card ${c.cls}"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
}

function renderRiskBars() {
  const total = auditedRules.length || 1;
  const counts = {};
  auditedRules.forEach(r => r.flags.forEach(f => { counts[f] = (counts[f]||0)+1; }));
  const col = { CRITICAL:'var(--critical)', HIGH:'var(--high)', MEDIUM:'var(--medium)', LOW:'var(--low)', OK:'var(--ok)' };
  document.getElementById('risk-bars').innerHTML = RISKS.map(r => {
    const cnt = counts[r.id] || 0;
    const pct = Math.round((cnt/total)*100);
    return `<div class="risk-row">
      <div class="risk-label" title="${esc(r.desc)}">${r.label} <span class="tag ${r.sev}">${r.sev}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col[r.sev]}"></div></div>
      <div class="risk-count" style="color:${col[r.sev]}">${cnt}</div>
    </div>`;
  }).join('');
}

function renderBadges() {
  document.getElementById('risk-badges').innerHTML =
    ['CRITICAL','HIGH','MEDIUM','LOW','OK'].map(s =>
      `<span class="badge ${s}" data-sev="${s}" onclick="toggleSev('${s}')">${s}</span>`).join('');
}

let activeSev = null;
function toggleSev(s) {
  activeSev = activeSev === s ? null : s;
  document.querySelectorAll('.badge').forEach(b => b.classList.toggle('active', b.dataset.sev === activeSev));
  document.getElementById('filter-sev').value = activeSev || '';
  pageNum = 0; applyFilters();
}

// ════════════════════════════════════════════════════════════════
// TABLE
// ════════════════════════════════════════════════════════════════
const COLS = [
  { key:'name',     lbl:'Rule Name' },
  { key:'enabled',  lbl:'Status' },
  { key:'action',   lbl:'Action' },
  { key:'src',      lbl:'Source' },
  { key:'dst',      lbl:'Destination' },
  { key:'service',  lbl:'Service' },
  { key:'hits',     lbl:'Hits' },
  { key:'last_hit', lbl:'Last Hit' },
  { key:'comment',  lbl:'Comment' },
  { key:'severity', lbl:'Severity' },
  { key:'flags',    lbl:'Findings' },
];

function renderTableHeader() {
  document.getElementById('rules-thead').innerHTML = '<tr>' + COLS.map(c =>
    `<th data-key="${c.key}" onclick="sortBy('${c.key}')">${c.lbl} <span class="si">↕</span></th>`
  ).join('') + '</tr>';
}

function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fa = document.getElementById('filter-action').value.toLowerCase();
  const fs = document.getElementById('filter-sev').value;

  filteredRules = auditedRules.filter(r => {
    if (fa === 'allow' && !r.allow) return false;
    if (fa === 'deny'  && !r.deny)  return false;
    if (fa === 'drop'  && !r.drop)  return false;
    if (fs && r.severity !== fs)    return false;
    if (q) {
      const hay = [r.name,r.src,r.dst,r.service,r.action,r.comment,r.src_zone,r.dst_zone,r.last_hit].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortCol) {
    filteredRules.sort((a, b) => {
      let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      if (sortCol === 'hits') { av = Number(av)||0; bv = Number(bv)||0; }
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  document.getElementById('visible-count').textContent = filteredRules.length;
  document.getElementById('total-count').textContent   = auditedRules.length;
  pageNum = 0;
  renderPage();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.key === col);
    th.querySelector('.si').textContent = th.dataset.key === col ? (sortDir===1?'↓':'↑') : '↕';
  });
  renderPage();
}

function renderPage() {
  const slice = filteredRules.slice(pageNum * PAGE_SIZE, (pageNum+1) * PAGE_SIZE);
  const tbody = document.getElementById('rules-tbody');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="${COLS.length}"><div class="empty-state"><p>No rules match the current filters</p></div></td></tr>`;
    renderPagination(); return;
  }
  tbody.innerHTML = slice.map(r => '<tr class="sev-' + r.severity + '">' + COLS.map(c => renderCell(c.key, r)).join('') + '</tr>').join('');
  renderPagination();
}

function renderCell(key, r) {
  const v = r[key] ?? '';
  if (key === 'action')  return `<td class="${r.allow?'act-allow':r.deny?'act-deny':r.drop?'act-drop':''}">${esc(v)}</td>`;
  if (key === 'src' || key === 'dst') return `<td class="${isAny(v)?'val-any':''}" title="${esc(v)}">${esc(v)||'—'}</td>`;
  if (key === 'service') return `<td class="${isAny(v)?'val-any':''}" title="${esc(v)}">${esc(v)||'—'}</td>`;
  if (key === 'hits')    return `<td class="${v!==''&&Number(v)===0?'val-zero':''}">${v===''?'—':esc(String(v))}</td>`;
  if (key === 'severity') return `<td><span class="tag ${v}">${v}</span></td>`;
  if (key === 'enabled')  return `<td><span class="tag ${isDisabled(v)?'MEDIUM':'OK'}">${isDisabled(v)?'Disabled':'Enabled'}</span></td>`;
  if (key === 'flags') {
    if (!v.length) return '<td><span class="tag OK">Clean</span></td>';
    return '<td class="wrap">' + v.map(id => {
      const risk = RISK_MAP[id]; if (!risk) return '';
      return `<span class="tag ${risk.sev}" title="${esc(risk.desc)}">${risk.label}</span>`;
    }).join(' ') + '</td>';
  }
  if (key === 'comment') return `<td title="${esc(String(v))}" style="max-width:160px">${v?esc(String(v)):'<span style="color:var(--text-dim)">—</span>'}</td>`;
  return `<td title="${esc(String(v))}">${esc(String(v))||'—'}</td>`;
}

function renderPagination() {
  const total = filteredRules.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag   = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = `<button onclick="goPage(${pageNum-1})" ${!pageNum?'disabled':''}>‹ Prev</button>`;
  const s = Math.max(0,pageNum-2), e = Math.min(pages-1,pageNum+2);
  if (s>0) html += `<button onclick="goPage(0)">1</button><span>…</span>`;
  for (let i=s;i<=e;i++) html += `<button class="${i===pageNum?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  if (e<pages-1) html += `<span>…</span><button onclick="goPage(${pages-1})">${pages}</button>`;
  html += `<button onclick="goPage(${pageNum+1})" ${pageNum===pages-1?'disabled':''}>Next ›</button>`;
  html += `<span>${PAGE_SIZE*pageNum+1}–${Math.min(PAGE_SIZE*(pageNum+1),total)} of ${total}</span>`;
  pag.innerHTML = html;
}
function goPage(n) { pageNum = n; renderPage(); }

// ════════════════════════════════════════════════════════════════
// NAV HELPERS
// ════════════════════════════════════════════════════════════════
function backToConnect() {
  document.getElementById('sec-connect').style.display = '';
  document.getElementById('sec-layers').style.display = 'none';
  document.getElementById('sec-loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
}
function backToLayers() {
  document.getElementById('sec-layers').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('btn-load-rules').disabled = true;
  selectedLayer = null;
  document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('selected'));
}

// ════════════════════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════════════════════
function exportCSV() {
  const flagged = auditedRules.filter(r => r.flags.length);
  const cols = ['severity','name','action','src','dst','service','hits','last_hit','comment','flags'];
  const rows = [cols.join(','), ...flagged.map(r =>
    cols.map(c => { let v = c==='flags' ? r.flags.join(' | ') : (r[c]??''); return `"${String(v).replace(/"/g,'""')}"`; }).join(',')
  )];
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')], {type:'text/csv'}));
  a.download = 'fw_audit_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
